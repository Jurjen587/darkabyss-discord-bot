name: Deploy to web server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -Eeuo pipefail
            APP_NAME="darkabyss-discord-bot"
            DEPLOY_DIR="${{ secrets.DEPLOY_DIR }}"

            # ── Ensure the deploy directory is a git repo ──
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "ERROR: $DEPLOY_DIR is not a git repository. Clone the repo there first."
              exit 1
            fi

            cd "$DEPLOY_DIR"

            echo "==> Pulling latest code (main)"
            git fetch --all --prune
            git checkout main
            git reset --hard origin/main

            echo "==> Installing production dependencies"
            npm ci --omit=dev

            echo "==> PM2: start or reload $APP_NAME"
            if pm2 describe "$APP_NAME" > /dev/null 2>&1; then
              pm2 startOrRestart ecosystem.config.cjs --update-env
            else
              pm2 start ecosystem.config.cjs --update-env
            fi

            pm2 save

            echo "==> Status"
            pm2 show "$APP_NAME" || true

            echo "==> Deploy finished successfully"